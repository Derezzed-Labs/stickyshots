name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
            artifact: stickyshots-${{ github.ref_name }}-linux.AppImage

          - os: macos-latest
            arch: x64
            target: mac
            artifact: stickyshots-${{ github.ref_name }}-macos.dmg

          - os: windows-latest
            arch: x64
            target: win
            artifact: stickyshots-${{ github.ref_name }}-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./app
        run: npm install

      - name: Build Electron app
        working-directory: ./app
        run: npm run dist

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/release/stickyshots-*.exe
            app/release/*.dmg
            app/release/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Also create a source code release
  source-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Create source zip
        run: |
          zip -r stickyshots-source-${{ github.ref_name }}.zip . \
            -x "*.git*" "node_modules/*" "*.DS_Store" "app/release/*" "dist/*"

      - name: Upload source to release
        uses: softprops/action-gh-release@v1
        with:
          files: stickyshots-source-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
